<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SWGOH Mod Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2234;--border:#1e3a5f;--gold:#f5a623;--orange:#fb923c;--green:#4ade80;--blue:#7dd3fc;--purple:#a78bfa;--yellow:#fde68a;--white:#e2e8f0;--muted:#64748b;--red:#f87171;--dkgreen:#14532d;--dkblue:#0f2d49;--dkpurple:#2d1b69}
body{background:var(--bg);color:var(--white);font-family:'Exo 2',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.title{text-align:center;padding:10px 0 0;font-family:Rajdhani;font-weight:700;font-size:18px;color:var(--gold);letter-spacing:1px}
.tabs{display:flex}
.tab{flex:1;padding:10px 0 8px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:Rajdhani;font-weight:600;font-size:13px;cursor:pointer;letter-spacing:1px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{padding:16px}
.panel{display:none}.panel.active{display:block}
input[type=text],input[type=number],select{width:100%;padding:10px 12px;background:var(--card2);color:var(--white);border:2px solid #ffffff15;border-radius:8px;font-size:14px;font-family:'Exo 2';outline:none;-webkit-appearance:none}
select{appearance:auto;-webkit-appearance:auto}
input:focus,select:focus{border-color:var(--gold)44}
.lbl{font-size:11px;font-weight:600;letter-spacing:1px;margin-bottom:4px;font-family:Rajdhani}
.lbl-orange{color:var(--orange)}.lbl-blue{color:var(--blue)}.lbl-green{color:var(--green)}.lbl-yellow{color:var(--yellow)}
.field{margin-bottom:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:Rajdhani}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card-compact{padding:10px 14px;margin-bottom:6px;cursor:pointer}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.slot{background:#0a0e17;border-radius:6px;padding:6px 8px;border-left:3px solid var(--muted)}
.slot-top{display:flex;justify-content:space-between;align-items:center}
.slot-shape{font-size:10px;color:var(--blue);font-family:Rajdhani;font-weight:600}
.slot-set{font-size:9px;font-family:Rajdhani;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.slot-lbl{font-size:9px;color:var(--muted);font-family:Rajdhani;margin-top:2px;letter-spacing:.5px}
.slot-val{font-size:12px;font-family:'Exo 2'}
.result{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.verdict-box{background:var(--card);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
.ref-table{width:100%;font-size:11px;font-family:'Exo 2';border-collapse:collapse}
.ref-table th,.ref-table td{padding:3px 6px}
.ref-table th{text-align:left;color:var(--blue)}
.footer{text-align:center;padding:12px 0 20px;font-size:10px;color:var(--muted);font-family:Rajdhani}
.empty{color:var(--muted);text-align:center;padding:30px;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="title">SWGOH MOD GUIDE</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab(0)">🔍 Lookup</button>
    <button class="tab" onclick="showTab(1)">⚙ Finder</button>
    <button class="tab" onclick="showTab(2)">⚡ Slice</button>
  </div>
</div>

<div class="content">
  <div id="p0" class="panel active">
    <input type="text" id="lookupQ" placeholder="Search character or faction..." oninput="doLookup()" style="margin-bottom:12px;border-color:var(--gold)33">
    <div id="lookupResults"></div>
  </div>

  <div id="p1" class="panel">
    <div class="field"><div class="lbl lbl-orange">MOD SET BONUS</div><select id="fSet" onchange="doFinder()"><option value="">Select...</option></select></div>
    <div class="field"><div class="lbl lbl-blue">MOD SHAPE</div><select id="fShape" onchange="onFinderShape()"><option value="">Select...</option></select></div>
    <div id="fPriWrap" class="field" style="display:none"><div class="lbl lbl-green">PRIMARY STAT</div><select id="fPri" onchange="doFinder()"><option value="">Select...</option></select></div>
    <div id="fFixedMsg" style="display:none;font-size:12px;color:var(--muted);padding:8px 12px;background:var(--card2);border-radius:8px;margin-bottom:12px"></div>
    <div class="lbl lbl-yellow" style="margin-bottom:6px">SECONDARIES (up to 4)</div>
    <div class="row2" id="fSecWrap"></div>
    <div id="fLegend" style="display:none;font-size:11px;color:var(--muted);font-family:Rajdhani;margin:12px 0 8px">🟢 1-3 = partial · 🔵 4-7 = good · 🟣 8+ = strong</div>
    <div id="finderResults"></div>
    <div id="finderEmpty" class="empty">Enter mod details above to find matching characters</div>
  </div>

  <div id="p2" class="panel">
    <div class="field"><div class="lbl lbl-orange">MOD SET BONUS</div><select id="sSet"><option value="">Select...</option></select></div>
    <div class="field"><div class="lbl lbl-blue">MOD SHAPE</div><select id="sShape" onchange="onSliceShape()"><option value="">Select...</option></select></div>
    <div id="sPriWrap" class="field" style="display:none"><div class="lbl lbl-green">PRIMARY STAT</div><select id="sPri"><option value="">Select...</option></select></div>
    <div id="sFixedMsg" style="display:none;font-size:12px;color:var(--muted);padding:8px 12px;background:var(--card2);border-radius:8px;margin-bottom:12px"></div>
    <div class="lbl lbl-yellow" style="margin-bottom:8px">SECONDARIES (level 12 values)</div>
    <div id="sSecWrap"></div>
    <button onclick="doSlice()" style="width:100%;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:8px;font-family:Rajdhani;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;margin-top:12px">ANALYZE MOD</button>
    <div id="sliceResults" style="margin-top:16px"></div>
  </div>
</div>

<div class="footer">318 characters · Kyber GAC data · April 2026</div>

function parseSlots(ms){
  const p=[];const re=/([A-Za-z\s]+)\(x(\d)\)/g;let m;
  while((m=re.exec(ms))!==null)p.push({n:m[1].trim(),c:parseInt(m[2])});
  const order=["Square","Arrow","Diamond","Triangle","Circle","Cross"];
  const a={};let i=0;
  for(const x of p){for(let j=0;j<x.c&&i<6;j++){a[order[i]]=x.n;i++;}}
  while(i<6){a[order[i]]=p[0]?.n||"";i++;}
  return a;
}

}

function charCardHTML(c,compact){
  const sm=parseSlots(c.modSet);
  const slots=[{k:"Square",i:"■",v:"Offense%",f:true},{k:"Arrow",i:"▲",v:c.arrow,f:false},{k:"Diamond",i:"◆",v:"Defense%",f:true},{k:"Triangle",i:"△",v:c.triangle,f:false},{k:"Circle",i:"○",v:c.circle,f:false},{k:"Cross",i:"✚",v:c.cross,f:false}];
  let h='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div>';
  h+='<div style="color:var(--gold);font-weight:700;font-size:'+(compact?15:17)+'px;font-family:Rajdhani">'+c.name+'</div>';
  h+='<div style="color:var(--muted);font-size:11px;font-family:Rajdhani">'+c.faction+'</div></div>';
  h+='<span class="badge" style="background:var(--blue)22;color:var(--blue);border:1px solid var(--blue)44">'+c.role+'</span></div>';
  h+='<div style="background:var(--card2);border-radius:8px;padding:10px;margin-bottom:8px">';
  h+='<div style="font-size:11px;color:var(--orange);font-weight:600;margin-bottom:6px;font-family:Rajdhani;letter-spacing:1px">MOD SET</div>';
  h+='<div style="color:var(--white);font-size:13px">'+c.modSet+'</div></div>';
  h+='<div class="slot-grid">';
  slots.forEach(s=>{
    const sc=SET_COL[sm[s.k]]||'var(--muted)';
    h+='<div class="slot" style="border-left-color:'+sc+'">';
    h+='<div class="slot-top"><span class="slot-shape">'+s.i+' '+s.k+'</span><span class="slot-set" style="color:'+sc+'">'+sm[s.k]+'</span></div>';
    h+='<div class="slot-lbl">PRIMARY</div>';
    h+='<div class="slot-val" style="color:'+(s.f?'var(--muted)':'var(--white)')+'">'+s.v+(s.f?' (fixed)':'')+'</div></div>';
  });
  h+='</div>';
  h+='<div style="font-size:11px;color:var(--green);font-family:Rajdhani;font-weight:600;letter-spacing:1px;margin-bottom:2px">SECONDARY PRIORITIES</div>';
  h+='<div style="font-size:12px;color:var(--white)">'+c.secs+'</div>';

    h+='<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:8px">';
    h+='<div style="font-size:11px;color:var(--purple);font-family:Rajdhani;font-weight:600;letter-spacing:1px;margin-bottom:4px">◇ BACKUP BUILD</div>';
    h+='<div style="font-size:12px;color:var(--purple);margin-bottom:4px">'+c.buSet+'</div>';

    if(c.buSecs&&c.buSecs!==c.secs) h+='<div style="font-size:11px;color:#c4b5fd;margin-top:4px">'+c.buSecs+'</div>';
    h+='</div>';
  }
  return h;
}

  else if(PRI_MAP[sh]){pw.style.display='block';fm.style.display='none';opts(ps,PRI_MAP[sh]);}
  else{pw.style.display='none';fm.style.display='none';ps.value='';}
  doFinder();

function doFinder(){
  const set=document.getElementById('fSet').value;
  const shape=document.getElementById('fShape').value;
  const pri=document.getElementById('fPri').value;
  const secs=[];for(let i=0;i<4;i++)secs.push(document.getElementById('fSec'+i).value);
  const el=document.getElementById('finderResults');
  const leg=document.getElementById('fLegend');
  const emp=document.getElementById('finderEmpty');
  if(!set&&!shape&&!pri&&secs.every(s=>!s)){el.innerHTML='';leg.style.display='none';emp.style.display='block';return;}
  emp.style.display='none';
  const res=CHARS.map(c=>{
    let score=0,setMatch=false,priMatch=false;
    if(set&&c.modSet.toLowerCase().includes(set.toLowerCase())){score+=2;setMatch=true;}
    if(pri){const sk=shape==='Arrow'?'arrow':shape==='Triangle'?'triangle':shape==='Circle'?'circle':shape==='Cross'?'cross':'';if(sk&&c[sk]===pri){score+=3;priMatch=true;}}
    const cs=c.secs.toLowerCase();
    const secMatches=new Set();
    secs.forEach((s,i)=>{if(s){const sl=s.toLowerCase().replace('%','');if(cs.includes(sl)){score+=(i<3?2:1);secMatches.add(s.toLowerCase());}}});
    return{...c,score,setMatch,priMatch,secMatches};
  }).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,15);
  leg.style.display=res.length?'block':'none';
  const sc=s=>s<=3?'var(--green)':s<=7?'var(--blue)':'var(--purple)';
  const bg=s=>s<=3?'var(--dkgreen)':s<=7?'var(--dkblue)':'var(--dkpurple)';
  el.innerHTML=res.map((r,i)=>{
    const tags=[];
    if(r.setMatch)tags.push('<span style="color:var(--green)">Set match</span>');
    if(r.priMatch)tags.push('<span style="color:var(--green)">Primary match</span>');
    const secParts=r.secs.split(' > ').map(s=>{
      const hit=r.secMatches.has(s.toLowerCase())||r.secMatches.has(s.toLowerCase().replace('%',''))||[...r.secMatches].some(m=>s.toLowerCase().includes(m));
      return hit?'<span style="color:var(--gold);font-weight:700">'+s+'</span>':'<span style="color:var(--muted)">'+s+'</span>';
    });
    const secLine='<div style="font-size:10px;font-family:Rajdhani;margin-top:3px">'+secParts.join('<span style="color:var(--muted)"> &gt; </span>')+'</div>';
    return '<div class="result" style="background:'+bg(r.score)+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="color:var(--gold);font-weight:700;font-size:14px;font-family:Rajdhani">'+(i+1)+'. '+r.name+'</span><span style="color:var(--muted);font-size:10px;margin-left:6px;font-family:Rajdhani">'+r.faction+'</span></div><span style="color:'+sc(r.score)+';font-weight:700;font-size:16px;font-family:Rajdhani">'+r.score+'</span></div><div style="font-size:11px;color:var(--orange);margin-top:2px">'+r.modSet+'</div>'+(tags.length?'<div style="font-size:10px;font-family:Rajdhani;margin-top:2px">'+tags.join(' · ')+'</div>':'')+secLine+'</div>';
  }).join('');
}

  const shape=document.getElementById('sShape').value;
  const pri=document.getElementById('sPri').value;
  const secs=[];
  for(let i=0;i<4;i++){const n=document.getElementById('sSN'+i).value;const v=document.getElementById('sSV'+i).value;if(n&&v)secs.push({name:n,val:parseFloat(v)});}
  if(!secs.length){document.getElementById('sliceResults').innerHTML='<div class="empty">Enter at least one secondary stat</div>';return;}

  const ratings=secs.map(s=>{
    const ref=SLICE_REF.find(r=>r.s===s.name);if(!ref)return{name:s.name,val:s.val,rating:'?',pct:0};
    const pct=Math.round(s.val/ref.m5*100);
    let rating='LOW';if(s.val>=ref.gr)rating='GREAT';else if(s.val>=ref.g)rating='GOOD';
    return{name:s.name,val:s.val,rating,pct,ref};
  });

  const spd=ratings.find(r=>r.name==='Speed');const sv=spd?spd.val:0;
  const gc=ratings.filter(r=>r.rating==='GREAT').length;
  const goc=ratings.filter(r=>r.rating==='GOOD'||r.rating==='GREAT').length;
  const isAS=shape==='Arrow'&&pri==='Speed';
  const isF=shape==='Square'||shape==='Diamond';

  let verdict='REVIEW',reason='';
  if(isAS){if(gc>=3){verdict='SLICE HIGH';reason='Speed arrow + 3 GREAT secondaries';}else if(gc>=1||goc>=2){verdict='KEEP ARROW';reason='Speed arrow with decent secondaries';}else{verdict='SELL';reason='Speed arrow but weak secondaries';}}
  else{if(sv>=20){verdict='SLICE TOP';reason='Elite speed 20+';}else if(sv>=15){verdict='SLICE HIGH';reason='Strong speed 15+';}else if(sv>=10&&goc>=2){verdict='SLICE GOOD';reason='Speed 10+ with good secondaries';}else if(sv>=10){verdict='KEEP SPEED';reason='Decent speed, weak other stats';}else if(sv===0&&goc>=3){verdict='KEEP NON SPEED';reason='No speed but strong other stats';}else if(sv<5&&goc<=1&&!isF){verdict='SELL';reason='Low speed, weak stats, non-fixed slot';}else if(isF&&goc>=1){verdict='KEEP';reason='Fixed slot ('+shape+') with usable stats';}else if(isF){verdict='REVIEW';reason='Fixed slot — primary gains may justify slice';}}

  const vc=verdict.includes('SLICE')?'var(--green)':verdict==='SELL'?'var(--red)':verdict.includes('KEEP')?'var(--yellow)':'var(--orange)';
  const rc=r=>r==='GREAT'?'var(--orange)':r==='GOOD'?'var(--yellow)':'var(--muted)';

  let h='<div class="verdict-box" style="border:2px solid '+vc+'">';
  h+='<div style="font-size:11px;color:var(--muted);font-family:Rajdhani;letter-spacing:2px;margin-bottom:4px">VERDICT</div>';
  h+='<div style="font-size:28px;font-weight:700;color:'+vc+';font-family:Rajdhani">'+verdict+'</div>';
  h+='<div style="font-size:12px;color:var(--muted);margin-top:4px">'+reason+'</div></div>';

  h+='<div style="font-size:11px;color:var(--muted);font-family:Rajdhani;font-weight:600;letter-spacing:1px;margin-bottom:8px">SECONDARY QUALITY</div>';
  ratings.forEach(r=>{
    h+='<div style="background:var(--card2);border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
    h+='<div><span style="color:var(--white);font-size:13px">'+r.name+': '+r.val+(r.name.includes('%')?'%':'')+'</span>';
    h+='<span style="color:var(--muted);font-size:10px;font-family:Rajdhani;margin-left:8px">('+r.pct+'% of 5A max)</span></div>';
    h+='<span class="badge" style="background:'+rc(r.rating)+'22;color:'+rc(r.rating)+';border:1px solid '+rc(r.rating)+'44">'+r.rating+'</span></div>';
  });

  const activeNames=secs.map(s=>s.name);
  h+='<div style="background:var(--card2);border-radius:8px;padding:12px;margin-top:12px">';
  h+='<div style="font-size:11px;color:var(--muted);font-family:Rajdhani;font-weight:600;letter-spacing:1px;margin-bottom:6px">REFERENCE TABLE</div>';
  h+='<div style="overflow-x:auto"><table class="ref-table"><thead><tr><th>Stat</th><th style="text-align:center">Max 5A</th><th style="text-align:center;color:var(--green)">Max 6E</th><th style="text-align:center;color:var(--yellow)">Good≥</th><th style="text-align:center;color:var(--orange)">Great≥</th></tr></thead><tbody>';
  SLICE_REF.forEach(r=>{
    const a=activeNames.includes(r.s);
    h+='<tr style="color:'+(a?'var(--white)':'var(--muted)')+';background:'+(a?'#ffffff08':'transparent')+'">';
    h+='<td style="font-weight:'+(a?600:400)+'">'+r.s+'</td>';
    h+='<td style="text-align:center">'+r.m5+'</td>';
    h+='<td style="text-align:center;color:'+(a?'var(--green)':'inherit')+'">'+r.m6+'</td>';
    h+='<td style="text-align:center;color:'+(a?'var(--yellow)':'inherit')+'">'+r.g+'</td>';
    h+='<td style="text-align:center;color:'+(a?'var(--orange)':'inherit')+'">'+r.gr+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  document.getElementById('sliceResults').innerHTML=h;
}
</script>
</body>
</html>
